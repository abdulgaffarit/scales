<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title }}</title>
  <meta name="description" content="{{ meta_description }}">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://{{ site_domain }}{{ canonical_url }}">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#1e40af">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
:root {
  --primary: #1e40af; --primary-light: #3b82f6; --primary-50: #eff6ff;
  --primary-100: #dbeafe; --accent: #059669; --gray-950: #030712;
  --gray-900: #111827; --gray-800: #1f2937; --gray-700: #374151;
  --gray-600: #4b5563; --gray-500: #6b7280; --gray-400: #9ca3af;
  --gray-300: #d1d5db; --gray-200: #e5e7eb; --gray-100: #f3f4f6;
  --gray-50: #f9fafb; --white: #ffffff;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --max: 1200px; --tr: 0.2s cubic-bezier(.4,0,.2,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
body { font-family: var(--font); background: var(--gray-50); color: var(--gray-900); line-height: 1.6; -webkit-font-smoothing: antialiased }
a { color: var(--primary-light); text-decoration: none; transition: color var(--tr) }
a:hover { color: var(--primary); text-decoration: underline }

.site-header { background: rgba(255,255,255,.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,.06); position: sticky; top: 0; z-index: 200 }
.header-inner { max-width: var(--max); margin: 0 auto; padding: 0 28px; height: 64px; display: flex; align-items: center; gap: 24px }
.logo { font-size: 1.25rem; font-weight: 900; color: var(--primary); text-decoration: none; letter-spacing: -.3px }
.logo span { color: var(--accent) }
.logo:hover { text-decoration: none }
.header-nav { display: flex; align-items: center; gap: 4px; margin-left: auto }
.header-nav a { color: var(--gray-600); font-size: 0.84rem; font-weight: 500; padding: 7px 14px; border-radius: 8px; transition: all var(--tr) }
.header-nav a:hover { color: var(--primary); background: var(--primary-50); text-decoration: none }
.mobile-menu-btn { display: none; background: none; border: none; cursor: pointer; padding: 8px; border-radius: 8px; color: var(--gray-700); transition: background var(--tr) }
.mobile-menu-btn:hover { background: var(--gray-100) }
.mobile-menu-btn svg { width: 22px; height: 22px; display: block }
.mobile-nav-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 999; opacity: 0; transition: opacity .25s }
.mobile-nav-overlay.active { display: block; opacity: 1 }
.mobile-nav { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: var(--white); z-index: 1000; padding: 20px; box-shadow: -4px 0 20px rgba(0,0,0,.15); transition: right .3s cubic-bezier(.4,0,.2,1); overflow-y: auto }
.mobile-nav.active { right: 0 }
.mobile-nav-close { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 20px }
.mobile-nav-close button { background: none; border: none; cursor: pointer; padding: 8px; border-radius: 8px; color: var(--gray-600) }
.mobile-nav-close button:hover { background: var(--gray-100) }
.mobile-nav-links { display: flex; flex-direction: column; gap: 4px }
.mobile-nav-links a { display: block; padding: 12px 16px; border-radius: 8px; font-size: 0.95rem; font-weight: 500; color: var(--gray-700); transition: all var(--tr) }
.mobile-nav-links a:hover { background: var(--primary-50); color: var(--primary); text-decoration: none }

.page-content { max-width: 800px; margin: 0 auto; padding: 48px 28px 80px }
.page-content h1 { font-size: 2rem; font-weight: 900; color: var(--gray-900); margin-bottom: 8px; letter-spacing: -.5px }
.page-content .subtitle { font-size: 1rem; color: var(--gray-500); margin-bottom: 40px }
.page-content h2 { font-size: 1.25rem; font-weight: 700; color: var(--gray-900); margin: 36px 0 12px; letter-spacing: -.2px }
.page-content h3 { font-size: 1.05rem; font-weight: 600; color: var(--gray-800); margin: 24px 0 8px }
.page-content p { color: var(--gray-700); font-size: 0.95rem; line-height: 1.8; margin-bottom: 16px }
.page-content ul, .page-content ol { color: var(--gray-700); font-size: 0.95rem; line-height: 1.8; margin: 0 0 16px 24px }
.page-content li { margin-bottom: 8px }
.page-content strong { color: var(--gray-900) }
.page-content .card { background: var(--white); border: 1px solid var(--gray-200); border-radius: 12px; padding: 24px; margin: 24px 0; box-shadow: 0 1px 3px rgba(0,0,0,.06) }
.page-content .card h3 { margin-top: 0 }
.page-content .highlight { background: var(--primary-50); border-left: 4px solid var(--primary-light); border-radius: 0 8px 8px 0; padding: 16px 20px; margin: 24px 0; font-size: 0.9rem; color: #1e40af; line-height: 1.7 }
.page-content .badge { display: inline-flex; align-items: center; gap: 6px; background: var(--primary-50); color: var(--primary); font-size: 0.75rem; font-weight: 600; padding: 4px 12px; border-radius: 50px; margin-bottom: 16px }

.site-footer { background: var(--gray-950); color: var(--gray-400); padding: 56px 28px 32px; margin-top: 80px }
.footer-inner { max-width: var(--max); margin: 0 auto; text-align: center; font-size: 0.84rem; line-height: 1.7 }
.footer-inner a { color: var(--gray-400) }
.footer-inner a:hover { color: var(--white) }

@media (max-width: 1024px) {
  .header-inner { padding: 0 20px; gap: 16px }
  .page-content { padding: 40px 24px 64px }
}
@media (max-width: 768px) {
  .header-inner { padding: 0 16px; height: 56px; gap: 12px }
  .header-nav { display: none }
  .mobile-menu-btn { display: block }
  .header-nav a { font-size: 0.78rem; padding: 6px 10px }
  .page-content { padding: 28px 16px 56px }
  .page-content h1 { font-size: 1.5rem; line-height: 1.25 }
  .page-content .subtitle { font-size: 0.92rem; margin-bottom: 28px }
  .page-content h2 { font-size: 1.12rem; margin: 28px 0 10px }
  .page-content h3 { font-size: 1rem }
  .page-content p { font-size: 0.9rem; line-height: 1.7 }
  .page-content ul, .page-content ol { font-size: 0.9rem; margin-left: 20px }
  .page-content .card { padding: 18px 16px; margin: 20px 0 }
  .page-content .highlight { padding: 14px 16px; margin: 20px 0; font-size: 0.86rem }
  .page-content .badge { font-size: 0.7rem; padding: 3px 10px }
  .site-footer { padding: 40px 16px 24px; margin-top: 56px }
  .footer-inner { font-size: 0.78rem }
  .footer-inner p { word-wrap: break-word }
}
@media (max-width: 480px) {
  .header-inner { padding: 0 14px; height: 52px }
  .logo { font-size: 1.05rem }
  .header-nav { gap: 0 }
  .header-nav a { font-size: 0.72rem; padding: 5px 7px }
  .page-content { padding: 20px 14px 40px }
  .page-content h1 { font-size: 1.3rem }
  .page-content h2 { font-size: 1.02rem }
  .page-content .card { padding: 16px 14px; border-radius: 10px }
  .page-content .highlight { padding: 12px 14px; font-size: 0.82rem; border-left-width: 3px }
  .site-footer { padding: 28px 14px 18px }
  .footer-inner { font-size: 0.74rem }
}
@media (max-width: 360px) {
  .page-content h1 { font-size: 1.2rem }
  .page-content { padding: 18px 12px 36px }
  .logo { font-size: 1rem }
}
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="logo">USA<span>Salaries</span></a>
    <nav class="header-nav">
      <a href="/">Browse</a>
      <a href="/about/">About</a>
      <a href="/methodology/">Methodology</a>
    </nav>
    <button class="mobile-menu-btn" aria-label="Open menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
  </div>
</header>

<div class="mobile-nav-overlay" id="mobileOverlay"></div>
<nav class="mobile-nav" id="mobileNav">
  <div class="mobile-nav-close"><button aria-label="Close menu"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>
  <div class="mobile-nav-links">
    <a href="/">Browse All Jobs</a>
    <a href="/about/">About</a>
    <a href="/methodology/">Methodology</a>
    <a href="/privacy/">Privacy Policy</a>
    <a href="/contact/">Contact</a>
  </div>
</nav>

<main class="page-content">
  {{ content | safe }}
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <p>© 2026 USASalaries · Data from U.S. Bureau of Labor Statistics · <a href="/privacy/">Privacy</a> · <a href="/methodology/">Methodology</a> · <a href="/sitemap.xml">Sitemap</a></p>
  </div>
</footer>

<script>
(function(){
  var btn=document.querySelector('.mobile-menu-btn');
  var nav=document.getElementById('mobileNav');
  var overlay=document.getElementById('mobileOverlay');
  var closeBtn=nav?nav.querySelector('.mobile-nav-close button'):null;
  function openMenu(){nav.classList.add('active');overlay.classList.add('active');document.body.style.overflow='hidden'}
  function closeMenu(){nav.classList.remove('active');overlay.classList.remove('active');document.body.style.overflow=''}
  if(btn)btn.addEventListener('click',openMenu);
  if(closeBtn)closeBtn.addEventListener('click',closeMenu);
  if(overlay)overlay.addEventListener('click',closeMenu);
})();
</script>
</body>
</html>
