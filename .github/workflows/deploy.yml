name: Build & Deploy USASalaries

on:
  push:
    branches: [main]
  schedule:
    # Auto-rebuild every 1st of the month (data refresh)
    - cron: '0 2 1 * *'
  workflow_dispatch:  # Manual trigger button in GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install jinja2 markupsafe

      - name: Verify Cloudflare Secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID secret is not set"
            exit 1
          fi
          echo "✅ Secrets configured"

      - name: Run Build Script
        run: python build.py

      - name: Show Build Stats
        run: |
          echo "Pages generated: $(find output -name '*.html' | wc -l)"
          echo "Total size: $(du -sh output | cut -f1)"
          echo "Sitemap URLs: $(grep -c '<loc>' output/sitemap.xml)"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy output --project-name=scales --branch=main --commit-dirty=true
